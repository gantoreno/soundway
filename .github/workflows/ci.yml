name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show Swift version
        run: swift --version

      - name: Check formatting
        run: swift format lint -r --strict Sources Tests

      - name: Build release binary
        run: swift build -c release

      - name: Run tests
        run: swift test
